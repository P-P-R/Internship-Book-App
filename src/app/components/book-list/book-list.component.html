<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Mina Böcker</h2>
    <button class="btn btn-primary" routerLink="/add">
      <i class="fa fa-plus"></i> Lägg till ny bok
    </button>
  </div>

  <table class="table table-striped table-hover shadow-sm">
    <thead class="table-dark">
      <tr>
        <th>Titel</th>
        <th>Författare</th>
        <th>Publiceringsdatum</th>
        <th>Åtgärder</th>
      </tr>
    </thead>
    <tbody>
      
      @if (books.length === 0) {
        <tr>
          <td colspan="4" class="text-center">Inga böcker hittades. Lägg till en ny!</td>
        </tr>
      } @else {
        
        @for (book of books; track $index) {
          <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.publishDate | date:'yyyy-MM-dd' }}</td>
            <td>
              <button class="btn btn-warning btn-sm me-2" [routerLink]="['/edit', book.id]">
                <i class="fa fa-pencil"></i> Redigera
              </button>
              
              <button class="btn btn-danger btn-sm" (click)="deleteBook(book.id)">
                <i class="fa fa-trash"></i> Radera
              </button>
            </td>
          </tr>
        }
      }
      
    </tbody>
  </table>
</div>
