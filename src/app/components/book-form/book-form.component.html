<div class="container mt-4">
  <div class="mb-3">
    <h2>{{ isEditMode ? 'Redigera bok' : 'Lägg till ny bok' }}</h2>
  </div>

  <div class="card shadow-sm p-4">
    <form (ngSubmit)="saveBook()" #bookForm="ngForm">
      
      <div class="mb-3">
        <label for="title" class="form-label fw-bold">Titel</label>
        <input type="text" id="title" name="title" class="form-control" [(ngModel)]="book.title" required>
      </div>

      <div class="mb-3">
        <label for="author" class="form-label fw-bold">Författare</label>
        <input type="text" id="author" name="author" class="form-control" [(ngModel)]="book.author" required>
      </div>

      <div class="mb-3">
        <label for="publishDate" class="form-label fw-bold">Publiceringsdatum</label>
        <input type="date" id="publishDate" name="publishDate" class="form-control" [(ngModel)]="book.publishDate" required>
      </div>

      <button type="submit" class="btn btn-success me-2">
        <i class="fa fa-save"></i> Spara bok
      </button>
      
      <button type="button" class="btn btn-secondary" routerLink="/">
        Avbryt
      </button>
      
    </form>
  </div>
</div>
