<div class="container mt-4">
  <div class="mb-3">
    <h2>{{ isEditMode ? 'Redigera citat' : 'Lägg till nytt citat' }}</h2>
  </div>

  <div class="card shadow-sm p-4">
    <form (ngSubmit)="saveQuote()" #quoteForm="ngForm">
      
      <div class="mb-3">
        <label for="text" class="form-label fw-bold">Citat</label>
        <textarea id="text" name="text" class="form-control" rows="3" [(ngModel)]="quote.text" required></textarea>
      </div>

      <div class="mb-3">
        <label for="author" class="form-label fw-bold">Författare (Vem sa det?)</label>
        <input type="text" id="author" name="author" class="form-control" [(ngModel)]="quote.author" required>
      </div>

      <button type="submit" class="btn btn-success me-2" [disabled]="!quoteForm.form.valid">
        <i class="fa fa-save"></i> Spara citat
      </button>
      
      <button type="button" class="btn btn-secondary" routerLink="/quotes">
        Avbryt
      </button>
      
    </form>
  </div>
</div>
