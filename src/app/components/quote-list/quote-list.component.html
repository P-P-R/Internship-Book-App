<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Mina Favoritcitat</h2>
    <button class="btn btn-primary" routerLink="/quotes/add">
      <i class="fa fa-plus"></i> Lägg till nytt citat
    </button>
  </div>

  <div class="card shadow-sm p-3">
    @if (quotes.length === 0) {
      <p class="text-center mt-3 text-muted">Inga citat hittades. Lägg till dina 5 favoriter!</p>
    } @else {
      <ul class="list-group list-group-flush">
        
        @for (quote of quotes; track $index) {
          <li class="list-group-item d-flex justify-content-between align-items-center py-3">
            <div>
              <h5 class="mb-1 font-italic">"{{ quote.text }}"</h5>
              <small class="text-muted fw-bold">- {{ quote.author }}</small>
            </div>
            
            <div class="d-flex">
              <button class="btn btn-warning btn-sm me-2" [routerLink]="['/quotes/edit', quote.id]">
                <i class="fa fa-pencil"></i> Redigera
              </button>
              
              <button class="btn btn-danger btn-sm" (click)="deleteQuote(quote.id)">
                <i class="fa fa-trash"></i> Radera
              </button>
            </div>
          </li>
        }

      </ul>
    }
  </div>
</div>
